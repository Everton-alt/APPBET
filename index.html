<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista Pro - Full Analysis v3.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f8f9fa; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        
        /* Tela de Bloqueio */
        #tela-bloqueio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        /* Container Principal */
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display:none; }
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { padding: 12px 25px; cursor: pointer; border-radius: 8px 8px 0 0; background: #eee; font-weight: bold; color: #666; display: none; } 
        .tab.active { background: var(--primary); color: white; }
        #tab2 { display: block; } /* Aba de análise sempre visível */

        .content { display: none; }
        .content.active { display: block; }
        
        button { padding: 12px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .btn-comprar { background: #f39c12; margin-top: 10px; width: 100%; }
        .btn-sair { background: var(--danger); padding: 5px 15px; font-size: 12px; margin-left: 10px; }
        
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-on { background: #d4edda; color: #155724; }
        .badge-off { background: #f8d7da; color: #721c24; }
        
        /* Grid de Análise */
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fff; }
        .card h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .stats-list { list-style: none; padding: 0; margin: 0; }
        .stats-list li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #eee; font-size: 14px; }

        /* Botão customizado de upload */
        .btn-upload { background: var(--primary); color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div id="tela-bloqueio">
    <div class="login-box">
        <h2 style="color: var(--primary); margin: 0;">🎯 Analista Pro</h2>
        <p style="color: #666; font-size: 14px;">Controle de Acesso v3.3</p>
        <input type="email" id="emailAcesso" placeholder="Digite seu e-mail cadastrado">
        <button style="width:100%" onclick="verificarAcesso()">ENTRAR NO SISTEMA</button>
        <button class="btn-comprar" onclick="window.open('https://www.asaas.com/c/g64s85n26xcdpvnj', '_blank')">ASSINAR AGORA</button>
        <p id="msgErro" style="color:red; margin-top:15px; font-weight:bold; display:none;"></p>
    </div>
</div>

<div class="container" id="app-principal">
    <div class="header-app">
        <h2 style="margin:0;">🎯 Analista Pro <small style="font-size: 12px; color: #999;">xG Stats</small></h2>
        <div style="display: flex; align-items: center;">
            <div id="indicadorDados"></div>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab" id="tab1" onclick="openTab('aba-importar')">CONFIGURAÇÕES (ADM)</div>
        <div class="tab active" id="tab2" onclick="openTab('aba-buscar')">ANÁLISE DE JOGO</div>
    </div>

    <div id="aba-importar" class="content">
        <div style="background: #f0f4f8; padding: 25px; border-radius: 12px; border: 2px dashed var(--primary);">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <h3 style="margin: 0; color: var(--primary);">📤 Upload de Base Global</h3>
                <label for="fileInput" class="btn-upload">IMPORTAR EXCEL</label>
                <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;">
            </div>
            <p style="color: #555; font-size: 13px; margin-top: 10px;">Atualize a base de dados de todos os usuários enviando um novo arquivo Excel.</p>
            <p id="statusUpload" style="display:none; color: var(--accent); font-weight: bold; font-size: 12px;">⏳ Processando arquivo, aguarde...</p>
        </div>
    </div>

    <div id="aba-buscar" class="content active">
        <div class="grid-inputs">
            <div><label style="font-size: 12px; font-weight: bold;">Prob. Casa (1)</label><input type="number" id="buscaCasa" step="0.01" value="0.50"></div>
            <div><label style="font-size: 12px; font-weight: bold;">Prob. Empate (X)</label><input type="number" id="buscaEmpate" step="0.01" value="0.25"></div>
            <div><label style="font-size: 12px; font-weight: bold;">Prob. Fora (2)</label><input type="number" id="buscaFora" step="0.01" value="0.25"></div>
        </div>
        <button style="width:100%; font-size: 16px;" onclick="buscarDados()">EXECUTAR ANÁLISE COMPLETA</button>

        <div id="resultadoBusca" style="display:none; margin-top:20px;">
            <p id="infoFiltro" style="text-align: center; color: #666; font-size: 13px;"></p>
            <div class="dashboard" id="dashboard"></div>
        </div>
    </div>
</div>

<script>
    let dadosExcel = [];
    const TOLERANCIA_MAXIMA = 0.10;
    const URL_RENDER = "https://sistema-analisador.onrender.com";
    const SEU_EMAIL_ADM = "everton.cl@outlook.com"; 

    window.onload = async function() {
        const salvo = localStorage.getItem('email_logado');
        if(salvo) {
            document.getElementById('emailAcesso').value = salvo;
            verificarAcesso();
        }
    };

    async function verificarAcesso() {
        const emailInput = document.getElementById('emailAcesso').value.trim().toLowerCase();
        const msgErro = document.getElementById('msgErro');
        if(!emailInput) return;

        try {
            const response = await fetch(`${URL_RENDER}/validar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput })
            });
            const data = await response.json();

            if (data.autorizado) {
                document.getElementById('tela-bloqueio').style.display = 'none';
                document.getElementById('app-principal').style.display = 'block';
                localStorage.setItem('email_logado', emailInput);

                if (emailInput === SEU_EMAIL_ADM) {
                    document.getElementById('tab1').style.display = 'block';
                }
                carregarBaseDoServidor();
            } else {
                msgErro.innerText = data.msg;
                msgErro.style.display = "block";
            }
        } catch (err) { 
            msgErro.innerText = "Erro de conexão com o servidor.";
            msgErro.style.display = "block";
        }
    }

    function sair() {
        localStorage.removeItem('email_logado');
        location.reload();
    }

    async function carregarBaseDoServidor() {
        const indicador = document.getElementById('indicadorDados');
        indicador.innerHTML = `<span class="status-badge" style="color:#666">⏳ Sincronizando...</span>`;
        try {
            const response = await fetch(`${URL_RENDER}/obter-base`);
            const dados = await response.json();
            if (dados && dados.length > 0) {
                dadosExcel = dados.map(j => ({
                    'Casa': j.casa, 'Visitante': j.visitante,
                    'Placar Casa': j.placar_casa, 'Placar Visitante': j.placar_visitante,
                    'Prob, Casa (1)': parseFloat(j.prob_casa),
                    'Prob, Empate (X)': parseFloat(j.prob_empate),
                    'Prob, Fora (2)': parseFloat(j.prob_fora)
                }));
                indicador.innerHTML = `<span class="status-badge badge-on">● Online: ${dadosExcel.length}</span>`;
            } else { 
                indicador.innerHTML = `<span class="status-badge badge-off">○ Base Vazia</span>`; 
            }
        } catch (err) { 
            indicador.innerHTML = `<span class="status-badge badge-off">❌ Erro de Sincronia</span>`; 
        }
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const statusTxt = document.getElementById('statusUpload');
        const senhaAdm = prompt("Confirme sua SENHA (Henrique2026):");
        if (!senhaAdm) { this.value = ""; return; }

        const file = e.target.files[0];
        if(!file) return;

        statusTxt.style.display = "block";
        const reader = new FileReader();
        reader.onload = async function(evt) {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const tempDados = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            try {
                const response = await fetch(`${URL_RENDER}/importar-base`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jogos: tempDados, senha: senhaAdm })
                });
                if (response.ok) {
                    alert("✅ BASE ATUALIZADA GLOBALMENTE!");
                    carregarBaseDoServidor();
                } else { alert("❌ Erro na autorização."); }
            } catch (err) { alert("❌ Erro de conexão."); }
            finally { statusTxt.style.display = "none"; }
        };
        reader.readAsArrayBuffer(file);
    });

    function openTab(tabName) {
        let contents = document.getElementsByClassName("content");
        for (let c of contents) c.classList.remove("active");
        let tabs = document.getElementsByClassName("tab");
        for (let t of tabs) t.classList.remove("active");
        
        document.getElementById(tabName).classList.add("active");
        if(tabName === 'aba-importar') document.getElementById('tab1').classList.add("active");
        else document.getElementById('tab2').classList.add("active");
    }

    function buscarDados() {
        if (dadosExcel.length === 0) return alert("Base vazia.");
        const c = parseFloat(document.getElementById('buscaCasa').value);
        const e = parseFloat(document.getElementById('buscaEmpate').value);
        const f = parseFloat(document.getElementById('buscaFora').value);

        let similares = dadosExcel.map(j => {
            let dist = Math.sqrt(Math.pow(j['Prob, Casa (1)'] - c, 2) + Math.pow(j['Prob, Empate (X)'] - e, 2) + Math.pow(j['Prob, Fora (2)'] - f, 2));
            return { ...j, dist, peso: dist === 0 ? 10 : 1 / (dist + 0.001) };
        }).filter(j => j.dist <= TOLERANCIA_MAXIMA).sort((a,b) => a.dist - b.dist).slice(0, 30);

        renderizarCards(similares);
    }

    function renderizarCards(jogos) {
        const dashboard = document.getElementById('dashboard');
        document.getElementById('resultadoBusca').style.display = "block";
        if (jogos.length === 0) {
            dashboard.innerHTML = "<div style='grid-column: span 2; text-align:center;'>⚠️ Sem jogos similares.</div>";
            return;
        }

        let pesoTotal = 0; let stats = { gC: 0, gV: 0, vC: 0, vE: 0, vV: 0, ambos: 0, o25: 0 };
        jogos.forEach(j => {
            const p = j.peso; pesoTotal += p;
            const c = j['Placar Casa']; const v = j['Placar Visitante'];
            stats.gC += (c * p); stats.gV += (v * p);
            if (c > v) stats.vC += p; else if (c === v) stats.vE += p; else stats.vV += p;
            if (c > 0 && v > 0) stats.ambos += p;
            if (c + v > 2.5) stats.o25 += p;
        });

        const calc = (val) => (val / pesoTotal * 100).toFixed(1);
        document.getElementById('infoFiltro').innerText = `Análise de ${jogos.length} jogos similares.`;
        
        dashboard.innerHTML = `
            <div class="card"><h4>⚽ xG (Gols Esperados)</h4><ul class="stats-list"><li>Casa: <b>${(stats.gC/pesoTotal).toFixed(2)}</b></li><li>Fora: <b>${(stats.gV/pesoTotal).toFixed(2)}</b></li></ul></div>
            <div class="card"><h4>🏆 Probabilidades</h4><ul class="stats-list"><li>Casa: <b>${calc(stats.vC)}%</b></li><li>Empate: <b>${calc(stats.vE)}%</b></li><li>Fora: <b>${calc(stats.vV)}%</b></li></ul></div>
            <div class="card"><h4>🔥 Mercados</h4><ul class="stats-list"><li>Ambos Marcam: <b>${calc(stats.ambos)}%</b></li><li>Over 2.5: <b>${calc(stats.o25)}%</b></li></ul></div>
            <div class="card"><h4>🛡️ Chance Dupla</h4><ul class="stats-list"><li>1X: <b>${calc(stats.vC+stats.vE)}%</b></li><li>X2: <b>${calc(stats.vE+stats.vV)}%</b></li></ul></div>
        `;
    }
</script>
</body>
</html>
