<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista Pro - Full Analysis v3.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f8f9fa; --danger: #e74c3c; --gold: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        
        #tela-bloqueio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .container { max-width: 950px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display:none; }
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { padding: 12px 25px; cursor: pointer; border-radius: 8px 8px 0 0; background: #eee; font-weight: bold; color: #666; display: none; } 
        .tab.active { background: var(--primary); color: white; }
        #tab2 { display: block; }

        .content { display: none; }
        .content.active { display: block; }
        
        button { padding: 12px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .btn-comprar { background: var(--gold); margin-top: 10px; width: 100%; color: white; text-decoration: none; display: block; padding: 12px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .btn-sair { background: var(--danger); padding: 5px 15px; font-size: 12px; margin-left: 10px; }
        
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-on { background: #d4edda; color: #155724; }
        .badge-off { background: #f8d7da; color: #721c24; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .card h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .stats-list { list-style: none; padding: 0; margin: 0; }
        .stats-list li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #eee; font-size: 13px; }
        
        .top-picks { background: #fff9e6; border: 2px solid var(--gold); border-radius: 12px; padding: 20px; margin-bottom: 25px; display: none; }
        .pick-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px 15px; border-radius: 8px; margin-top: 10px; border-left: 5px solid var(--gold); }
        .pick-rank { font-weight: 900; color: var(--gold); font-size: 20px; }
    </style>
</head>
<body>

<div id="tela-bloqueio">
    <div class="login-box">
        <h2 style="color: var(--primary); margin: 0;">🎯 Analista Pro</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Controle de Acesso v3.5</p>
        <input type="email" id="emailAcesso" placeholder="Seu e-mail cadastrado">
        <button style="width:100%" onclick="verificarAcesso()">ENTRAR NO SISTEMA</button>
        
        <a href="https://www.asaas.com/c/g64s85n26xcdpvnj" target="_blank" class="btn-comprar">ASSINAR AGORA</a>
        
        <p id="msgErro" style="color:red; margin-top:15px; font-weight:bold; display:none;"></p>
    </div>
</div>

<div class="container" id="app-principal">
    <div class="header-app">
        <h2 style="margin:0;">🎯 Analista Pro <small style="font-size: 12px; color: #999;">v3.5</small></h2>
        <div style="display: flex; align-items: center;">
            <div id="indicadorDados"></div>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab" id="tab1" onclick="openTab('aba-importar')">ADM: IMPORTAR</div>
        <div class="tab active" id="tab2" onclick="openTab('aba-buscar')">ANÁLISE TÉCNICA</div>
    </div>

    <div id="aba-importar" class="content">
        <div style="background: #f0f4f8; padding: 25px; border-radius: 12px; border: 2px dashed var(--primary); text-align: center;">
            <h3 style="margin: 0; color: var(--primary);">📤 Upload de Base Global</h3>
            <label for="fileInput" style="background:var(--primary); color:white; padding:10px 20px; border-radius:5px; cursor:pointer; display:inline-block; margin-top:15px;">SELECIONAR EXCEL</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;">
        </div>
    </div>

    <div id="aba-buscar" class="content active">
        <div class="grid-inputs">
            <div><label>Prob. Casa (1)</label><input type="number" id="buscaCasa" step="0.01" value="0.50"></div>
            <div><label>Prob. Empate (X)</label><input type="number" id="buscaEmpate" step="0.01" value="0.25"></div>
            <div><label>Prob. Fora (2)</label><input type="number" id="buscaFora" step="0.01" value="0.25"></div>
        </div>
        <button style="width:100%; font-size: 16px; height: 50px;" onclick="buscarDados()">GERAR RELATÓRIO DE PROBABILIDADES</button>

        <div id="resultadoBusca" style="display:none; margin-top:25px;">
            <div id="top-picks-container" class="top-picks">
                <h3 style="margin:0; color: var(--gold); display:flex; align-items:center; gap:10px;">⭐ AS 3 MELHORES ENTRADAS</h3>
                <div id="picks-list"></div>
            </div>
            
            <div class="dashboard" id="dashboard"></div>
        </div>
    </div>
</div>

<script>
    let dadosExcel = [];
    const URL_RENDER = "https://sistema-analisador.onrender.com";
    const SEU_EMAIL_ADM = "everton.cl@outlook.com"; 

    async function verificarAcesso() {
        const email = document.getElementById('emailAcesso').value.trim().toLowerCase();
        const msgErro = document.getElementById('msgErro');
        if(!email) return;
        try {
            const response = await fetch(`${URL_RENDER}/validar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            const data = await response.json();
            if (data.autorizado) {
                document.getElementById('tela-bloqueio').style.display = 'none';
                document.getElementById('app-principal').style.display = 'block';
                localStorage.setItem('email_logado', email);
                if (email === SEU_EMAIL_ADM) document.getElementById('tab1').style.display = 'block';
                carregarBaseDoServidor();
            } else { 
                msgErro.innerText = data.msg;
                msgErro.style.display = "block";
            }
        } catch (err) { 
            msgErro.innerText = "Erro de conexão.";
            msgErro.style.display = "block";
        }
    }

    async function carregarBaseDoServidor() {
        const indicador = document.getElementById('indicadorDados');
        indicador.innerHTML = `⌛ Sincronizando...`;
        try {
            const response = await fetch(`${URL_RENDER}/obter-base`);
            const dados = await response.json();
            if (dados && dados.length > 0) {
                dadosExcel = dados.map(j => ({
                    casa: j.casa, visitante: j.visitante,
                    pC: j.placar_casa, pV: j.placar_visitante,
                    probC: parseFloat(j.prob_casa), probE: parseFloat(j.prob_empate), probF: parseFloat(j.prob_fora)
                }));
                indicador.innerHTML = `<span class="status-badge badge-on">● Online: ${dadosExcel.length}</span>`;
            } else { indicador.innerHTML = `<span class="status-badge badge-off">○ Base Vazia</span>`; }
        } catch (err) { indicador.innerHTML = `❌ Erro`; }
    }

    function buscarDados() {
        if (dadosExcel.length === 0) return alert("Base vazia!");
        const c = parseFloat(document.getElementById('buscaCasa').value);
        const e = parseFloat(document.getElementById('buscaEmpate').value);
        const f = parseFloat(document.getElementById('buscaFora').value);

        let similares = dadosExcel.map(j => {
            let dist = Math.sqrt(Math.pow(j.probC - c, 2) + Math.pow(j.probE - e, 2) + Math.pow(j.probF - f, 2));
            return { ...j, dist, peso: 1 / (dist + 0.001) };
        }).filter(j => j.dist <= 0.12).sort((a,b) => a.dist - b.dist).slice(0, 50);

        processarEstatisticas(similares);
    }

    function processarEstatisticas(jogos) {
        if (jogos.length === 0) return alert("Nenhum padrão similar encontrado.");
        
        let pesoT = 0; 
        let s = { vC:0, vE:0, vV:0, o15:0, u15:0, o25:0, u25:0, o35:0, u35:0, ambos:0, gC:0, gV:0 };

        jogos.forEach(j => {
            const p = j.peso; pesoT += p;
            const totalGols = j.pC + j.pV;
            if (j.pC > j.pV) s.vC += p; else if (j.pC === j.pV) s.vE += p; else s.vV += p;
            if (totalGols > 1.5) s.o15 += p; else s.u15 += p;
            if (totalGols > 2.5) s.o25 += p; else s.u25 += p;
            if (totalGols > 3.5) s.o35 += p; else s.u35 += p;
            if (j.pC > 0 && j.pV > 0) s.ambos += p;
            s.gC += (j.pC * p); s.gV += (j.pV * p);
        });

        const pc = (val) => (val / pesoT * 100);
        
        const entradas = [
            { nome: "Vitória Casa (1)", val: pc(s.vC) },
            { nome: "Empate (X)", val: pc(s.vE) },
            { nome: "Vitória Fora (2)", val: pc(s.vV) },
            { nome: "Over 1.5 Gols", val: pc(s.o15) },
            { nome: "Under 1.5 Gols", val: pc(s.u15) },
            { nome: "Over 2.5 Gols", val: pc(s.o25) },
            { nome: "Under 2.5 Gols", val: pc(s.u25) },
            { nome: "Over 3.5 Gols", val: pc(s.o35) },
            { nome: "Under 3.5 Gols", val: pc(s.u35) },
            { nome: "Ambos Marcam", val: pc(s.ambos) },
            { nome: "1X (Casa ou Emp)", val: pc(s.vC + s.vE) },
            { nome: "X2 (Fora ou Emp)", val: pc(s.vE + s.vV) }
        ].sort((a,b) => b.val - a.val).slice(0, 3);

        renderizar(s, pesoT, entradas, jogos.length);
    }

    function renderizar(s, pesoT, top, totalJogos) {
        document.getElementById('resultadoBusca').style.display = "block";
        const pc = (val) => (val / pesoT * 100).toFixed(1);

        document.getElementById('top-picks-container').style.display = "block";
        document.getElementById('picks-list').innerHTML = top.map((t, i) => `
            <div class="pick-item">
                <span><b class="pick-rank">#${i+1}</b> &nbsp; ${t.nome}</span>
                <b style="color:var(--accent); font-size:18px;">${t.val.toFixed(1)}%</b>
            </div>
        `).join('');

        document.getElementById('dashboard').innerHTML = `
            <div class="card"><h4>🏆 Resultado Final</h4><ul class="stats-list"><li>Casa: <b>${pc(s.vC)}%</b></li><li>Empate: <b>${pc(s.vE)}%</b></li><li>Fora: <b>${pc(s.vV)}%</b></li></ul></div>
            <div class="card"><h4>⚽ Mercado de Gols</h4><ul class="stats-list"><li>Over 1.5: <b>${pc(s.o15)}%</b></li><li>Over 2.5: <b>${pc(s.o25)}%</b></li><li>Over 3.5: <b>${pc(s.o35)}%</b></li><li>Ambos Marcam: <b>${pc(s.ambos)}%</b></li></ul></div>
            <div class="card"><h4>📉 Under Gols</h4><ul class="stats-list"><li>Under 1.5: <b>${pc(s.u15)}%</b></li><li>Under 2.5: <b>${pc(s.u25)}%</b></li><li>Under 3.5: <b>${pc(s.u35)}%</b></li></ul></div>
            <div class="card"><h4>📊 Médias e xG</h4><ul class="stats-list"><li>Média Gols Casa: <b>${(s.gC/pesoT).toFixed(2)}</b></li><li>Média Gols Fora: <b>${(s.gV/pesoT).toFixed(2)}</b></li><li>Amostra Histórica: <b>${totalJogos} jogos</b></li></ul></div>
        `;
    }

    function openTab(t) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function sair() { localStorage.removeItem('email_logado'); location.reload(); }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const senha = prompt("Senha ADM:");
        if (senha !== "Henrique2026") return alert("Incorreta");
        const reader = new FileReader();
        reader.onload = async (evt) => {
            const wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            await fetch(`${URL_RENDER}/importar-base`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ jogos: data, senha: senha })
            });
            alert("Base Atualizada!"); carregarBaseDoServidor();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });
</script>
</body>
</html>
