<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista Pro - Full Analysis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1e293b; 
            --accent: #10b981; 
            --bg: #f1f5f9; 
            --danger: #ef4444; 
            --gold: #f59e0b; 
            --white: #ffffff;
            --border: #e2e8f0;
            --whatsapp: #25d366;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 0; margin: 0; color: #334155; }
        
        /* TELA DE LOGIN CENTRALIZADA */
        #tela-bloqueio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; 
        }
        .login-box { 
            background: white; padding: 40px; border-radius: 16px; 
            width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .login-box h2 { font-weight: 800; margin: 0; }
        .login-box input { width: 100%; padding: 14px; margin: 15px 0; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* BOTÕES */
        button { padding: 14px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; width: 100%; }
        button:hover { filter: brightness(1.1); }
        
        .btn-comprar { background: var(--gold); margin-top: 15px; width: 100%; color: white; text-decoration: none; display: block; padding: 14px; border-radius: 8px; font-weight: 700; text-align: center; box-sizing: border-box; }
        
        .btn-whatsapp { background: var(--whatsapp); margin-top: 10px; width: 100%; color: white; text-decoration: none; display: block; padding: 14px; border-radius: 8px; font-weight: 700; text-align: center; box-sizing: border-box; transition: 0.2s; }
        .btn-whatsapp:hover { filter: brightness(0.9); }

        .btn-sair { background: #f1f5f9; color: #64748b; padding: 8px 16px; font-size: 13px; border: 1px solid var(--border); width: auto; margin-left: 15px; }
        .btn-danger { background: var(--danger); }
        
        /* INTERFACE PRINCIPAL */
        .container { max-width: 1100px; margin: 40px auto; background: var(--white); padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display:none; }
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { padding: 12px 24px; cursor: pointer; border-radius: 8px; background: #f8fafc; font-weight: 600; color: #64748b; border: 1px solid var(--border); transition: 0.2s; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .content { display: none; }
        .content.active { display: block; }
        
        .status-badge { padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 700; }
        .badge-on { background: #ecfdf5; color: #059669; }
        .badge-off { background: #fef2f2; color: #dc2626; }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; background: #f8fafc; padding: 20px; border-radius: 12px; }
        .grid-inputs label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-weight: 600; box-sizing: border-box; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 25px; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; background: #fff; }
        .card h4 { margin: 0 0 12px 0; color: var(--primary); font-size: 12px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; text-transform: uppercase; }
        .stats-list { list-style: none; padding: 0; margin: 0; }
        .stats-list li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #f1f5f9; font-size: 13px; font-weight: 500; }
        .stats-list li b { color: var(--accent); }
        
        .top-picks { background: #fffbeb; border: 2px solid var(--gold); border-radius: 16px; padding: 25px; margin-bottom: 30px; }
        .pick-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 12px 20px; border-radius: 10px; margin-top: 10px; border: 1px solid #fef3c7; }
        
        .adm-section { background: #f8fafc; padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="tela-bloqueio">
    <div class="login-box">
        <h2 style="color: var(--primary);">🎯 ANALISTA PRO</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Inteligência de Dados 2026</p>
        
        <input type="email" id="emailAcesso" placeholder="Seu e-mail de acesso">
        <button onclick="verificarAcesso()">ENTRAR NO SISTEMA</button>
        
        <a href="https://www.asaas.com/c/g64s85n26xcdpvnj" target="_blank" class="btn-comprar">QUERO SER ASSINANTE</a>
        
        <a href="https://wa.me/557192831101?text=Olá,%20preciso%20de%20suporte%20no%20Analista%20Pro" target="_blank" class="btn-whatsapp">
            📱 FALAR COM SUPORTE
        </a>
        
        <p id="msgErro" style="color:var(--danger); margin-top:20px; font-weight:bold; display:none;"></p>
    </div>
</div>

<div class="container" id="app-principal">
    <div class="header-app">
        <h2 style="font-weight: 800; margin: 0;">🎯 Analista Pro <span style="font-weight: 400; color: #94a3b8; font-size: 14px;">v3.7</span></h2>
        <div style="display: flex; align-items: center;">
            <div id="indicadorDados"></div>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab" id="tab1" onclick="openTab('aba-importar')" style="display:none;">ADMINISTRAÇÃO</div>
        <div class="tab active" id="tab2" onclick="openTab('aba-buscar')">ANÁLISE TÉCNICA</div>
    </div>

    <div id="aba-importar" class="content">
        <div class="adm-section">
            <h3 style="margin-top:0; color: var(--primary);">👤 Gestão de Usuários</h3>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div>
                    <label style="font-size: 10px; font-weight: bold; color: #64748b;">EMAIL DO CLIENTE</label>
                    <input type="email" id="novoEmailUser" placeholder="exemplo@email.com" style="width:100%; padding:12px; border:1px solid var(--border); border-radius:8px;">
                </div>
                <div>
                    <label style="font-size: 10px; font-weight: bold; color: #64748b;">DIAS (0 = INATIVAR)</label>
                    <input type="number" id="diasAcesso" value="31">
                </div>
            </div>
            <button onclick="adicionarUsuarioManual()">SALVAR OU REATIVAR ACESSO</button>
        </div>

        <div class="adm-section" style="text-align:center; border: 2px dashed #cbd5e1;">
            <h3 style="margin:0;">📤 Atualizar Base Global (Excel)</h3>
            <p style="font-size: 12px; color: #64748b;">Selecione o arquivo para sobrescrever os dados atuais.</p>
            <label for="fileInput" style="background:var(--primary); color:white; padding:12px 25px; border-radius:8px; cursor:pointer; display:inline-block; margin-top:10px; font-weight:700;">SELECIONAR PLANILHA</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;">
        </div>
    </div>

    <div id="aba-buscar" class="content active">
        <div class="grid-inputs">
            <div><label>Prob. Casa (1)</label><input type="number" id="buscaCasa" step="0.01" value="0.50"></div>
            <div><label>Prob. Empate (X)</label><input type="number" id="buscaEmpate" step="0.01" value="0.25"></div>
            <div><label>Prob. Fora (2)</label><input type="number" id="buscaFora" step="0.01" value="0.25"></div>
        </div>
        <button style="width:100%; font-size: 16px; height: 55px;" onclick="buscarDados()">GERAR ANÁLISE COMPLETA</button>

        <div id="resultadoBusca" style="display:none; margin-top:35px;">
            <div id="top-picks-container" class="top-picks">
                <h3 style="margin:0; color: var(--gold); font-size: 18px;">⭐ AS 3 MELHORES ENTRADAS</h3>
                <div id="picks-list"></div>
            </div>
            <div class="dashboard" id="dashboard"></div>
        </div>
    </div>
</div>
