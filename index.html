<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista Pro - Full Analysis v3.7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1e293b; 
            --accent: #10b981; 
            --bg: #f1f5f9; 
            --danger: #ef4444; 
            --gold: #f59e0b; 
            --white: #ffffff;
            --border: #e2e8f0;
            --whatsapp: #25d366;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 0; margin: 0; color: #334155; }
        
        #tela-bloqueio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; 
        }
        .login-box { 
            background: white; padding: 40px; border-radius: 16px; 
            width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            position: relative;
        }
        
        #loader-login {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            border-radius: 16px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        button { padding: 14px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        
        .container { max-width: 1100px; margin: 40px auto; background: var(--white); padding: 30px; border-radius: 16px; display:none; }
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { padding: 12px 24px; cursor: pointer; border-radius: 8px; background: #f8fafc; font-weight: 600; border: 1px solid var(--border); }
        .tab.active { background: var(--primary); color: white; }
        
        .content { display: none; }
        .content.active { display: block; }

        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 25px; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; background: #fff; }
        .stats-list { list-style: none; padding: 0; margin: 0; font-size: 13px; }
        .stats-list li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #f1f5f9; }

        .top-picks { background: #fffbeb; border: 2px solid var(--gold); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .pick-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #fef3c7; }
        .status-badge { padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 700; }
        .badge-on { background: #ecfdf5; color: #059669; }
        .badge-off { background: #fef2f2; color: #dc2626; }
        
        .btn-comprar { background: var(--gold); margin-top: 15px; text-decoration: none; display: block; padding: 14px; border-radius: 8px; color: white; font-weight: 700; }
        .btn-whatsapp { background: var(--whatsapp); margin-top: 10px; text-decoration: none; display: block; padding: 14px; border-radius: 8px; color: white; font-weight: 700; }
    </style>
</head>
<body>

<div id="tela-bloqueio">
    <div class="login-box">
        <div id="loader-login"><div class="spinner"></div><p>Validando acesso...</p></div>
        <h2>🎯 ANALISTA PRO</h2>
        <input type="email" id="emailAcesso" placeholder="Seu e-mail de acesso">
        <button onclick="verificarAcesso()">ENTRAR NO SISTEMA</button>
        <a href="https://www.asaas.com/c/g64s85n26xcdpvnj" target="_blank" class="btn-comprar">QUERO SER ASSINANTE</a>
        <a href="https://wa.me/557192831101" target="_blank" class="btn-whatsapp">📱 SUPORTE</a>
    </div>
</div>

<div class="container" id="app-principal">
    <div class="header-app">
        <h2>🎯 Analista Pro <small style="font-size: 12px; color: #94a3b8;">v3.7</small></h2>
        <div id="indicadorDados"></div>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-analise" onclick="openTab('aba-buscar')">ANÁLISE TÉCNICA</div>
        <div class="tab" id="tab-adm" onclick="openTab('aba-importar')" style="display:none;">ADMINISTRAÇÃO</div>
    </div>

    <div id="aba-buscar" class="content active">
        <div class="grid-inputs">
            <div><label>Prob. Casa</label><input type="number" id="buscaCasa" step="0.01" value="0.50"></div>
            <div><label>Prob. Empate</label><input type="number" id="buscaEmpate" step="0.01" value="0.25"></div>
            <div><label>Prob. Fora</label><input type="number" id="buscaFora" step="0.01" value="0.25"></div>
        </div>
        <button onclick="buscarDados()">GERAR ANÁLISE COMPLETA</button>

        <div id="resultadoBusca" style="display:none; margin-top:30px;">
            <div class="top-picks">
                <h3 style="margin:0; color: var(--gold);">⭐ AS 3 MELHORES ENTRADAS</h3>
                <div id="picks-list"></div>
            </div>
            <div class="dashboard" id="dashboard"></div>
        </div>
    </div>

    <div id="aba-importar" class="content">
        <div style="background:#f8fafc; padding:25px; border-radius:12px; border:2px dashed #cbd5e1; text-align:center;">
            <h3>📤 Atualizar Base Global (Excel)</h3>
            <p>Selecione a planilha para enviar ao servidor Render.</p>
            <input type="file" id="fileInput" accept=".xlsx, .xls">
        </div>
    </div>
</div>

<script>
    let dadosExcel = [];
    const URL_RENDER = "https://sistema-analisador.onrender.com";

    function limparNumero(val) {
        if (typeof val === 'number') return val;
        if (!val) return 0;
        return parseFloat(val.toString().replace(',', '.').replace('%', ''));
    }

    async function verificarAcesso() {
        const email = document.getElementById('emailAcesso').value.trim().toLowerCase();
        const loader = document.getElementById('loader-login');
        if(!email) return;
        loader.style.display = 'flex';

        try {
            const res = await fetch(`${URL_RENDER}/validar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (data.autorizado) {
                document.getElementById('tela-bloqueio').style.display = 'none';
                document.getElementById('app-principal').style.display = 'block';
                if(data.is_admin) document.getElementById('tab-adm').style.display = 'block';
                carregarBaseDoServidor();
            } else {
                alert(data.msg);
                loader.style.display = 'none';
            }
        } catch (e) { 
            alert("Erro de conexão."); 
            loader.style.display = 'none';
        }
    }

    async function carregarBaseDoServidor() {
        const ind = document.getElementById('indicadorDados');
        try {
            const res = await fetch(`${URL_RENDER}/obter-base`);
            const dados = await res.json();
            dadosExcel = dados.map(j => ({
                pC: limparNumero(j.placar_casa), 
                pV: limparNumero(j.placar_visitante),
                probC: limparNumero(j.prob_casa), 
                probE: limparNumero(j.prob_empate), 
                probF: limparNumero(j.prob_fora)
            }));
            ind.innerHTML = `<span class="status-badge badge-on">● BASE ONLINE: ${dadosExcel.length}</span>`;
        } catch (e) { ind.innerHTML = `<span class="status-badge badge-off">❌ Erro de Conexão</span>`; }
    }

    // CORREÇÃO: Função de Importação conectada ao servidor
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                const senha = prompt("Confirme a senha de administrador para importar:");
                if(!senha) return;

                const res = await fetch(`${URL_RENDER}/importar-base`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ jogos: json, senha: senha })
                });

                if(res.ok) {
                    alert("Base importada com sucesso para o servidor!");
                    carregarBaseDoServidor();
                } else {
                    alert("Erro ao importar base. Verifique a senha.");
                }
            } catch (err) {
                alert("Erro ao processar arquivo Excel.");
            }
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function buscarDados() {
        const c = parseFloat(document.getElementById('buscaCasa').value);
        const e = parseFloat(document.getElementById('buscaEmpate').value);
        const f = parseFloat(document.getElementById('buscaFora').value);
        
        let similares = dadosExcel.map(j => {
            let dist = Math.sqrt(Math.pow(j.probC - c, 2) + Math.pow(j.probE - e, 2) + Math.pow(j.probF - f, 2));
            return { ...j, dist, peso: 1 / (dist + 0.001) };
        }).filter(j => j.dist <= 0.1).sort((a,b) => a.dist - b.dist).slice(0, 50);

        processarEstatisticas(similares);
    }

    function processarEstatisticas(jogos) {
        if (jogos.length === 0) return alert("Sem dados para essas odds.");
        let pesoT = 0, s = { vC:0, vE:0, vV:0, ambosSim:0, ambosNao:0, gC:0, gV:0, o05:0, o15:0, o25:0, u15:0, u25:0 };
        
        jogos.forEach(j => {
            const p = j.peso; pesoT += p;
            const total = j.pC + j.pV;
            if (j.pC > j.pV) s.vC += p; else if (j.pC === j.pV) s.vE += p; else s.vV += p;
            if (j.pC > 0 && j.pV > 0) s.ambosSim += p; else s.ambosNao += p;
            if (total > 0.5) s.o05 += p;
            if (total > 1.5) s.o15 += p; else s.u15 += p;
            if (total > 2.5) s.o25 += p; else s.u25 += p;
            s.gC += (j.pC * p); s.gV += (j.pV * p);
        });

        const pc = (val) => (val / pesoT * 100);
        const top = [
            { nome: "1X", val: pc(s.vC + s.vE) }, 
            { nome: "X2", val: pc(s.vE + s.vV) }, 
            { nome: "Over 1.5", val: pc(s.o15) },
            { nome: "Ambos Sim", val: pc(s.ambosSim) }, 
            { nome: "Casa (1)", val: pc(s.vC) }
        ].sort((a,b) => b.val - a.val).slice(0, 3);

        renderizar(s, pesoT, top, jogos.length);
    }

    function renderizar(s, pesoT, top, total) {
        document.getElementById('resultadoBusca').style.display = "block";
        const r = (val) => (val / pesoT * 100).toFixed(1);
        
        document.getElementById('picks-list').innerHTML = top.map((t, i) => `
            <div class="pick-item"><span><b>#${i+1}</b> ${t.nome}</span><b style="color:var(--accent);">${t.val.toFixed(1)}%</b></div>
        `).join('');

        document.getElementById('dashboard').innerHTML = `
            <div class="card"><h4>🏆 Principal</h4><ul class="stats-list"><li>Casa: <b>${r(s.vC)}%</b></li><li>Empate: <b>${r(s.vE)}%</b></li><li>Fora: <b>${r(s.vV)}%</b></li></ul></div>
            <div class="card"><h4>⚽ Ambos</h4><ul class="stats-list"><li>Sim: <b>${r(s.ambosSim)}%</b></li><li>Não: <b>${r(s.ambosNao)}%</b></li></ul></div>
            <div class="card"><h4>🔥 Gols</h4><ul class="stats-list"><li>+1.5: <b>${r(s.o15)}%</b></li><li>+2.5: <b>${r(s.o25)}%</b></li><li>Amostra: <b>${total}</b></li></ul></div>
        `;
    }

    function openTab(t) {
        document.querySelectorAll('.content, .tab').forEach(el => el.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        if(t === 'aba-importar') document.getElementById('tab-adm').classList.add('active');
        else document.getElementById('tab-analise').classList.add('active');
    }
</script>
</body>
</html>
