<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista Pro - Full Analysis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1e293b; 
            --accent: #10b981; 
            --bg: #f1f5f9; 
            --danger: #ef4444; 
            --gold: #f59e0b; 
            --white: #ffffff;
            --border: #e2e8f0;
            --whatsapp: #25d366;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 0; margin: 0; color: #334155; }
        
        /* TELA DE LOGIN CENTRALIZADA */
        #tela-bloqueio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; 
        }
        .login-box { 
            background: white; padding: 40px; border-radius: 16px; 
            width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .login-box h2 { font-weight: 800; margin: 0; }
        .login-box input { width: 100%; padding: 14px; margin: 15px 0; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* BOTÕES */
        button { padding: 14px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; width: 100%; }
        button:hover { filter: brightness(1.1); }
        
        .btn-comprar { background: var(--gold); margin-top: 15px; width: 100%; color: white; text-decoration: none; display: block; padding: 14px; border-radius: 8px; font-weight: 700; text-align: center; box-sizing: border-box; }
        
        .btn-whatsapp { background: var(--whatsapp); margin-top: 10px; width: 100%; color: white; text-decoration: none; display: block; padding: 14px; border-radius: 8px; font-weight: 700; text-align: center; box-sizing: border-box; transition: 0.2s; }
        .btn-whatsapp:hover { filter: brightness(0.9); }

        .btn-sair { background: #f1f5f9; color: #64748b; padding: 8px 16px; font-size: 13px; border: 1px solid var(--border); width: auto; margin-left: 15px; }
        .btn-danger { background: var(--danger); }
        
        /* INTERFACE PRINCIPAL */
        .container { max-width: 1100px; margin: 40px auto; background: var(--white); padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display:none; }
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { padding: 12px 24px; cursor: pointer; border-radius: 8px; background: #f8fafc; font-weight: 600; color: #64748b; border: 1px solid var(--border); transition: 0.2s; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .content { display: none; }
        .content.active { display: block; }
        
        .status-badge { padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 700; }
        .badge-on { background: #ecfdf5; color: #059669; }
        .badge-off { background: #fef2f2; color: #dc2626; }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; background: #f8fafc; padding: 20px; border-radius: 12px; }
        .grid-inputs label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-weight: 600; box-sizing: border-box; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 25px; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; background: #fff; }
        .card h4 { margin: 0 0 12px 0; color: var(--primary); font-size: 12px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; text-transform: uppercase; }
        .stats-list { list-style: none; padding: 0; margin: 0; }
        .stats-list li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #f1f5f9; font-size: 13px; font-weight: 500; }
        .stats-list li b { color: var(--accent); }
        
        .top-picks { background: #fffbeb; border: 2px solid var(--gold); border-radius: 16px; padding: 25px; margin-bottom: 30px; }
        .pick-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 12px 20px; border-radius: 10px; margin-top: 10px; border: 1px solid #fef3c7; }
        
        .adm-section { background: #f8fafc; padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="tela-bloqueio">
    <div class="login-box">
        <h2 style="color: var(--primary);">🎯 ANALISTA PRO</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Inteligência de Dados 2026</p>
        
        <input type="email" id="emailAcesso" placeholder="Seu e-mail de acesso">
        <button onclick="verificarAcesso()">ENTRAR NO SISTEMA</button>
        
        <a href="https://www.asaas.com/c/g64s85n26xcdpvnj" target="_blank" class="btn-comprar">QUERO SER ASSINANTE</a>
        
        <a href="https://wa.me/557192831101?text=Olá,%20preciso%20de%20suporte%20no%20Analista%20Pro" target="_blank" class="btn-whatsapp">
            📱 FALAR COM SUPORTE
        </a>
        
        <p id="msgErro" style="color:var(--danger); margin-top:20px; font-weight:bold; display:none;"></p>
    </div>
</div>

<div class="container" id="app-principal">
    <div class="header-app">
        <h2 style="font-weight: 800; margin: 0;">🎯 Analista Pro <span style="font-weight: 400; color: #94a3b8; font-size: 14px;">v3.7</span></h2>
        <div style="display: flex; align-items: center;">
            <div id="indicadorDados"></div>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab" id="tab1" onclick="openTab('aba-importar')" style="display:none;">ADMINISTRAÇÃO</div>
        <div class="tab active" id="tab2" onclick="openTab('aba-buscar')">ANÁLISE TÉCNICA</div>
    </div>

    <div id="aba-importar" class="content">
        <div class="adm-section">
            <h3 style="margin-top:0; color: var(--primary);">👤 Gestão de Usuários</h3>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div>
                    <label style="font-size: 10px; font-weight: bold; color: #64748b;">EMAIL DO CLIENTE</label>
                    <input type="email" id="novoEmailUser" placeholder="exemplo@email.com" style="width:100%; padding:12px; border:1px solid var(--border); border-radius:8px;">
                </div>
                <div>
                    <label style="font-size: 10px; font-weight: bold; color: #64748b;">DIAS (0 = INATIVAR)</label>
                    <input type="number" id="diasAcesso" value="31">
                </div>
            </div>
            <button onclick="adicionarUsuarioManual()">SALVAR OU REATIVAR ACESSO</button>
        </div>

        <div class="adm-section" style="text-align:center; border: 2px dashed #cbd5e1;">
            <h3 style="margin:0;">📤 Atualizar Base Global (Excel)</h3>
            <p style="font-size: 12px; color: #64748b;">Selecione o arquivo para sobrescrever os dados atuais.</p>
            <label for="fileInput" style="background:var(--primary); color:white; padding:12px 25px; border-radius:8px; cursor:pointer; display:inline-block; margin-top:10px; font-weight:700;">SELECIONAR PLANILHA</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;">
        </div>
    </div>

    <div id="aba-buscar" class="content active">
        <div class="grid-inputs">
            <div><label>Prob. Casa (1)</label><input type="number" id="buscaCasa" step="0.01" value="0.50"></div>
            <div><label>Prob. Empate (X)</label><input type="number" id="buscaEmpate" step="0.01" value="0.25"></div>
            <div><label>Prob. Fora (2)</label><input type="number" id="buscaFora" step="0.01" value="0.25"></div>
        </div>
        <button style="width:100%; font-size: 16px; height: 55px;" onclick="buscarDados()">GERAR ANÁLISE COMPLETA</button>

        <div id="resultadoBusca" style="display:none; margin-top:35px;">
            <div id="top-picks-container" class="top-picks">
                <h3 style="margin:0; color: var(--gold); font-size: 18px;">⭐ AS 3 MELHORES ENTRADAS</h3>
                <div id="picks-list"></div>
            </div>
            <div class="dashboard" id="dashboard"></div>
        </div>
    </div>
</div>

<script>
    let dadosExcel = [];
    const URL_RENDER = "https://sistema-analisador.onrender.com";

    // PROTEÇÃO CONTRA FERRAMENTAS DE DESENVOLVEDOR
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
    };

    function limparNumero(val) {
        if (typeof val === 'number') return val;
        if (!val) return 0;
        return parseFloat(val.toString().replace(',', '.').replace('%', ''));
    }

    // LOGIN COM VALIDAÇÃO DE ADM NO SERVIDOR
    async function verificarAcesso() {
        const emailInput = document.getElementById('emailAcesso').value.trim().toLowerCase();
        const msgErro = document.getElementById('msgErro');
        if(!emailInput) return;

        try {
            const response = await fetch(`${URL_RENDER}/validar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput })
            });
            const data = await response.json();
            
            if (data.autorizado) {
                document.getElementById('tela-bloqueio').style.display = 'none';
                document.getElementById('app-principal').style.display = 'block';
                localStorage.setItem('email_logado', emailInput);
                
                // O servidor informa se este e-mail deve ver a aba de administração
                if (data.is_admin) {
                    document.getElementById('tab1').style.display = 'block';
                }
                
                carregarBaseDoServidor();
            } else { 
                msgErro.innerText = data.msg;
                msgErro.style.display = "block";
            }
        } catch (err) { 
            msgErro.innerText = "Falha na conexão com o servidor.";
            msgErro.style.display = "block";
        }
    }

    async function carregarBaseDoServidor() {
        const indicador = document.getElementById('indicadorDados');
        indicador.innerHTML = `Sincronizando...`;
        try {
            const response = await fetch(`${URL_RENDER}/obter-base`);
            const dados = await response.json();
            if (dados && dados.length > 0) {
                dadosExcel = dados.map(j => ({
                    casa: j.casa, 
                    visitante: j.visitante,
                    pC: limparNumero(j.placar_casa), 
                    pV: limparNumero(j.placar_visitante),
                    probC: limparNumero(j.prob_casa), 
                    probE: limparNumero(j.prob_empate), 
                    probF: limparNumero(j.prob_fora)
                }));
                indicador.innerHTML = `<span class="status-badge badge-on">● BASE ONLINE: ${dadosExcel.length}</span>`;
            } else { indicador.innerHTML = `<span class="status-badge badge-off">○ Base Vazia</span>`; }
        } catch (err) { indicador.innerHTML = `<span class="status-badge badge-off">❌ Erro de Sincronia</span>`; }
    }

    function buscarDados() {
        if (dadosExcel.length === 0) return alert("Base de dados não carregada.");
        const c = parseFloat(document.getElementById('buscaCasa').value);
        const e = parseFloat(document.getElementById('buscaEmpate').value);
        const f = parseFloat(document.getElementById('buscaFora').value);

        let similares = dadosExcel.map(j => {
            let dist = Math.sqrt(Math.pow(j.probC - c, 2) + Math.pow(j.probE - e, 2) + Math.pow(j.probF - f, 2));
            return { ...j, dist, peso: 1 / (dist + 0.001) };
        }).filter(j => j.dist <= 0.1).sort((a,b) => a.dist - b.dist).slice(0, 50);

        processarEstatisticas(similares);
    }

    function processarEstatisticas(jogos) {
        if (jogos.length === 0) return alert("Dados insuficientes para este cenário de odds.");
        let pesoT = 0; 
        let s = { 
            vC:0, vE:0, vV:0, ambos:0, gC:0, gV:0,
            o05:0, o15:0, o25:0, o35:0, o45:0,
            u05:0, u15:0, u25:0, u35:0, u45:0
        };

        jogos.forEach(j => {
            const p = j.peso; pesoT += p;
            const totalGols = j.pC + j.pV;
            if (j.pC > j.pV) s.vC += p; else if (j.pC === j.pV) s.vE += p; else s.vV += p;
            if (j.pC > 0 && j.pV > 0) s.ambos += p;
            if (totalGols > 0.5) s.o05 += p;
            if (totalGols > 1.5) s.o15 += p;
            if (totalGols > 2.5) s.o25 += p;
            if (totalGols > 3.5) s.o35 += p;
            if (totalGols > 4.5) s.o45 += p;
            if (totalGols < 1.5) s.u15 += p;
            if (totalGols < 2.5) s.u25 += p;
            if (totalGols < 3.5) s.u35 += p;
            s.gC += (j.pC * p); s.gV += (j.pV * p);
        });

        const pc = (val) => (val / pesoT * 100);
        
        const entradas = [
            { nome: "Vitória Casa (1)", val: pc(s.vC) },
            { nome: "Empate (X)", val: pc(s.vE) },
            { nome: "Vitória Fora (2)", val: pc(s.vV) },
            { nome: "Ambos Marcam", val: pc(s.ambos) },
            { nome: "Casa ou Empate (1X)", val: pc(s.vC + s.vE) },
            { nome: "Empate ou Fora (X2)", val: pc(s.vE + s.vV) },
            { nome: "Over 1.5 Gols", val: pc(s.o15) },
            { nome: "Over 2.5 Gols", val: pc(s.o25) },
            { nome: "Under 3.5 Gols", val: pc(s.u35) }
        ].sort((a,b) => b.val - a.val).slice(0, 3);

        renderizar(s, pesoT, entradas, jogos.length);
    }

    function renderizar(s, pesoT, top, totalJogos) {
        document.getElementById('resultadoBusca').style.display = "block";
        const pc = (val) => (val / pesoT * 100).toFixed(1);

        document.getElementById('picks-list').innerHTML = top.map((t, i) => `
            <div class="pick-item">
                <span><b>#${i+1}</b> &nbsp; ${t.nome}</span>
                <b style="color:var(--accent); font-size:18px;">${t.val.toFixed(1)}%</b>
            </div>
        `).join('');

        document.getElementById('dashboard').innerHTML = `
            <div class="card"><h4>🏆 Principal</h4><ul class="stats-list"><li>Casa: <b>${pc(s.vC)}%</b></li><li>Empate: <b>${pc(s.vE)}%</b></li><li>Fora: <b>${pc(s.vV)}%</b></li><li>Ambos: <b>${pc(s.ambos)}%</b></li></ul></div>
            <div class="card"><h4>🤝 Dupla Chance</h4><ul class="stats-list"><li>1X: <b>${pc(s.vC+s.vE)}%</b></li><li>12: <b>${pc(s.vC+s.vV)}%</b></li><li>X2: <b>${pc(s.vE+s.vV)}%</b></li></ul></div>
            <div class="card"><h4>🔥 Over Gols</h4><ul class="stats-list"><li>+1.5: <b>${pc(s.o15)}%</b></li><li>+2.5: <b>${pc(s.o25)}%</b></li><li>+3.5: <b>${pc(s.o35)}%</b></li></ul></div>
            <div class="card"><h4>🛡️ Under Gols</h4><ul class="stats-list"><li>-1.5: <b>${pc(s.u15)}%</b></li><li>-2.5: <b>${pc(s.u25)}%</b></li><li>-3.5: <b>${pc(s.u35)}%</b></li></ul></div>
            <div class="card"><h4>📊 Médias</h4><ul class="stats-list"><li>xG Casa: <b>${(s.gC/pesoT).toFixed(2)}</b></li><li>xG Fora: <b>${(s.gV/pesoT).toFixed(2)}</b></li><li>Amostra: <b>${totalJogos}</b></li></ul></div>
        `;
    }

    function openTab(t) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function adicionarUsuarioManual() {
        const email = document.getElementById('novoEmailUser').value.trim();
        const dias = document.getElementById('diasAcesso').value;
        const senha = prompt("Digite a Senha Mestra:");
        if (!email || !senha) return;
        try {
            const res = await fetch(`${URL_RENDER}/adicionar-usuario`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha, dias })
            });
            const data = await res.json();
            alert(data.msg || data.erro);
        } catch (e) { alert("Erro de comunicação."); }
    }

    function sair() { localStorage.removeItem('email_logado'); location.reload(); }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const senha = prompt("Confirme a Senha Mestra para importar:");
        if (!senha) return;
        const reader = new FileReader();
        reader.onload = async (evt) => {
            try {
                const wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                const res = await fetch(`${URL_RENDER}/importar-base`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ jogos: data, senha: senha })
                });
                const resData = await res.json();
                alert(resData.msg || "Base Atualizada!"); 
                carregarBaseDoServidor();
            } catch (err) { alert("Erro ao ler o arquivo Excel."); }
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });
</script>
</body>
</html>
